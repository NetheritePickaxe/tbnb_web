<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBNB论坛</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: url('111.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #ffd700;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffd700;
            text-decoration: none;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li {
            margin-left: 2rem;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        nav ul li a:hover {
            color: #ffd700;
        }

        .main-content {
            min-height: 80vh;
            padding: 2rem 0;
        }

        .forum-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 2rem;
            border-radius: 10px;
            border: 2px solid #ffd700;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #333;
        }

        .user-info span {
            margin-right: 1rem;
            color: #ffd700;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.5rem;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #ffed4e;
            transform: translateY(-2px);
        }

        .admin-controls {
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 1px solid #ffd700;
        }

        .admin-controls h3 {
            color: #ffd700;
            margin-bottom: 1rem;
        }

        .admin-controls h4 {
            color: #ffd700;
            margin: 1.5rem 0 0.5rem 0;
        }

        .post-form {
            background: rgba(0, 0, 0, 0.7);
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .post-form h2 {
            color: #ffd700;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #ffd700;
            border-radius: 5px;
            color: #fff;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 150px;
        }

        .posts-container {
            margin-top: 2rem;
        }

        .post {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border: 1px solid #333;
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .post-title {
            color: #ffd700;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .post-meta {
            font-size: 0.8rem;
            color: #999;
        }

        .post-content {
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .post-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .comments {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #333;
        }

        .comment {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 5px;
            margin-bottom: 1rem;
        }

        .comment-meta {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 0.5rem;
        }

        .comment-content {
            margin-bottom: 0.5rem;
        }

        .comment-actions {
            font-size: 0.8rem;
        }

        .comment-actions button {
            background: none;
            border: none;
            color: #ffd700;
            cursor: pointer;
            margin-right: 1rem;
        }

        .comment-actions button:hover {
            text-decoration: underline;
        }

        .login-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .login-content {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .login-content h2 {
            color: #ffd700;
            margin-bottom: 2rem;
        }

        .close {
            color: #fff;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #ffd700;
        }

        .login-tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .login-tab {
            padding: 0.5rem 1.5rem;
            margin: 0 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-tab.active {
            background: #ffd700;
            color: #000;
            font-weight: bold;
        }

        .login-panel {
            display: none;
        }

        .login-panel.active {
            display: block;
        }

        .banned-users {
            margin-top: 1rem;
        }

        .banned-user {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }

        .unban-btn {
            padding: 0.3rem 0.8rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .unban-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .members-list {
            margin-top: 1rem;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 5px;
            margin-bottom: 0.5rem;
        }

        .member-info {
            display: flex;
            flex-direction: column;
        }

        .member-username {
            font-weight: bold;
            color: #ffd700;
        }

        .member-registered {
            font-size: 0.8rem;
            color: #999;
        }

        .delete-member-btn {
            padding: 0.3rem 0.8rem;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-member-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .ban-member-btn {
            padding: 0.3rem 0.8rem;
            background: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ban-member-btn:hover {
            background: #f57c00;
            transform: translateY(-2px);
        }

        .unban-member-btn {
            padding: 0.3rem 0.8rem;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .unban-member-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .member-actions {
            display: flex;
            gap: 0.5rem;
        }

        .member-status {
            font-size: 0.8rem;
            color: #f44336;
            margin-top: 0.2rem;
        }

        /* 禁言模态框 */
        .ban-modal {
            display: none;
            position: fixed;
            z-index: 10001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .ban-content {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 10px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 2px solid #ff9800;
            box-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
        }

        .ban-content h3 {
            color: #ff9800;
            margin-bottom: 1.5rem;
        }

        .ban-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .ban-form-group label {
            display: block;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .ban-form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #ff9800;
            border-radius: 5px;
            color: #fff;
        }
        
        .ban-form-group select option {
            background: #000;
            color: #fff;
        }

        .ban-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 999;
        }

        .back-to-top:hover {
            background: #ffed4e;
            transform: translateY(-5px);
        }

        .back-to-top .icon {
            width: 20px;
            height: 20px;
            border-left: 3px solid #000;
            border-top: 3px solid #000;
            transform: rotate(45deg);
        }

        footer {
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem 0;
            text-align: center;
            border-top: 2px solid #ffd700;
        }

        .footer-content {
            color: #999;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            nav ul {
                margin-top: 1rem;
            }

            nav ul li {
                margin-left: 0;
                margin-right: 1rem;
            }

            .user-info {
                flex-direction: column;
                align-items: flex-start;
            }

            .user-info span {
                margin-bottom: 0.5rem;
            }

            .post-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .post-meta {
                margin-top: 0.5rem;
            }

            .member-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .member-actions {
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="#" class="logo">TBNB论坛</a>
                <nav>
                    <ul>
                        <li><a href="index.html">首页</a></li>
                        <li><a href="#posts">帖子</a></li>
                        <li><a href="#about">关于</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- 论坛容器 -->
            <div class="forum-container">
                <!-- 用户信息 -->
                <div class="user-info">
                    <span id="userStatus">未登录</span>
                    <button id="loginBtn" class="btn" onclick="showLoginModal()">登录</button>
                    <button id="logoutBtn" class="btn" onclick="logout()" style="display: none;">退出</button>
                </div>
                
                <!-- 管理员控制面板 -->
                <div id="adminControls" class="admin-controls" style="display: none;">
                    <h3>管理员控制面板</h3>
                    <div class="banned-users" id="bannedUsersList">
                        <h4>已封禁用户</h4>
                        <div id="bannedUsers"></div>
                    </div>
                    <div class="members-list" id="membersList">
                        <h4>已注册成员</h4>
                        <div id="members"></div>
                    </div>
                </div>
                
                <!-- 发帖表单 -->
                <div id="postForm" class="post-form" style="display: none;">
                    <h2>发布帖子</h2>
                    <div class="form-group">
                        <label for="postTitle">标题</label>
                        <input type="text" id="postTitle" placeholder="请输入帖子标题">
                    </div>
                    <div class="form-group">
                        <label for="postContent">内容</label>
                        <textarea id="postContent" placeholder="请输入帖子内容"></textarea>
                    </div>
                    <button class="btn" onclick="createPost()">发布帖子</button>
                </div>
                
                <!-- 帖子列表 -->
                <div class="posts-container" id="postsContainer">
                    <h2 style="color: #ffd700; margin-bottom: 2rem;">论坛帖子</h2>
                    <div id="postsList"></div>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 登录模态框 -->
    <div id="loginModal" class="login-modal">
        <div class="login-content">
            <span class="close" id="closeLoginModal">&times;</span>
            <h2>登录</h2>
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchLoginTab('user')">用户登录</div>
                <div class="login-tab" onclick="switchLoginTab('register')">用户注册</div>
                <div class="login-tab" onclick="switchLoginTab('admin')">管理员登录</div>
            </div>
            
            <!-- 用户登录面板 -->
            <div id="userLoginPanel" class="login-panel active">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码">
                </div>
                <button class="btn" onclick="login('user')">登录</button>
            </div>
            
            <!-- 用户注册面板 -->
            <div id="registerPanel" class="login-panel">
                <div class="form-group">
                    <label for="registerUsername">用户名</label>
                    <input type="text" id="registerUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label for="registerPassword">密码</label>
                    <input type="password" id="registerPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">确认密码</label>
                    <input type="password" id="registerConfirmPassword" placeholder="请确认密码">
                </div>
                <button class="btn" onclick="register()">注册</button>
            </div>
            
            <!-- 管理员登录面板 -->
            <div id="adminLoginPanel" class="login-panel">
                <div class="form-group">
                    <label for="adminUsername">管理员用户名</label>
                    <input type="text" id="adminUsername" placeholder="请输入管理员用户名">
                </div>
                <div class="form-group">
                    <label for="adminPassword">管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                </div>
                <button class="btn" onclick="login('admin')">登录</button>
            </div>
        </div>
    </div>
    
    <!-- 禁言模态框 -->
    <div id="banModal" class="ban-modal">
        <div class="ban-content">
            <span class="close" id="closeBanModal">&times;</span>
            <h3>禁言用户</h3>
            <input type="hidden" id="banUsername">
            <div class="ban-form-group">

                    <option value="人身攻击">进行人身攻击</option>
                    <option value="违反规则">违反论坛规则</option>

            <div id="customBanReason" style="display: none; margin-top: 1rem;">

                    <label for="customBanReasonText">自定义禁言理由</label>
                    <textarea id="customBanReasonText" placeholder="请输入禁言理由" rows="3"></textarea>

            </div>
            <div class="ban-form-group" style="margin-top: 1rem;">
                <label for="banReason">禁言理由</label>
                <select id="banReason" onchange="toggleCustomBanReason()">
                    <option value="">请选择理由</option>
                    <option value="敏感词汇">发布敏感词汇</option>
                    <option value="政治内容">发布涉及政治的内容</option>
                    <option value="广告 spam">发布广告或垃圾信息</option>
                    <option value="人身攻击">进行人身攻击</option>
                    <option value="违反规则">违反论坛规则</option>
                    <option value="custom">其他理由</option>
                </select>
            </div>
            <div id="customBanReason" style="display: none; margin-top: 1rem;">
                <div class="ban-form-group">
                    <label for="customBanReasonText">自定义禁言理由</label>
                    <textarea id="customBanReasonText" placeholder="请输入禁言理由" rows="3"></textarea>
                </div>
            </div>
            <div class="ban-buttons">
                <button class="btn" onclick="closeBanModal()">取消</button>
                <button class="btn" onclick="banUser()">确定禁言</button>
            </div>
        </div>
    </div>
    
    <!-- 回到顶部按钮 -->
    <button class="back-to-top" id="backToTop">
        <span class="icon"></span>
    </button>
    
    <!-- JavaScript 文件 -->
    <script>
        // 初始化数据
        function initData() {
            // 初始化帖子数据
            if (!localStorage.getItem('posts')) {
                localStorage.setItem('posts', JSON.stringify([]));
            }
            
            // 初始化封禁用户数据
            if (!localStorage.getItem('bannedUsers')) {
                localStorage.setItem('bannedUsers', JSON.stringify([]));
            }
            
            // 初始化禁言用户数据
            if (!localStorage.getItem('mutedUsers')) {
                localStorage.setItem('mutedUsers', JSON.stringify([]));
            }
            
            // 初始化用户数据
            if (!localStorage.getItem('users')) {
                localStorage.setItem('users', JSON.stringify([]));
            }
            
            // 初始化已注册设备数据
            if (!localStorage.getItem('registeredDevices')) {
                localStorage.setItem('registeredDevices', JSON.stringify([]));
            }
        }
        
        // 获取浏览器指纹（作为设备唯一标识）
        function getDeviceFingerprint() {
            // 生成基于浏览器信息的指纹
            const fingerprint = [
                navigator.userAgent,
                navigator.language,
                navigator.platform,
                screen.width + 'x' + screen.height,
                window.innerWidth + 'x' + window.innerHeight,
                navigator.hardwareConcurrency,
                navigator.deviceMemory
            ].join('|');
            
            // 使用简单的哈希函数生成指纹
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                const char = fingerprint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            
            return Math.abs(hash).toString(16);
        }
        
        // 检查用户是否被禁言
        function isUserMuted(username) {
            const mutedUsers = JSON.parse(localStorage.getItem('mutedUsers'));
            const mutedUser = mutedUsers.find(user => user.username === username);
            
            if (mutedUser) {
                // 检查禁言是否过期
                if (mutedUser.expiryTime === -1) {
                    // 永久禁言
                    return true;
                } else if (Date.now() < mutedUser.expiryTime) {
                    // 禁言未过期
                    return true;
                } else {
                    // 禁言已过期，自动解除
                    const updatedMutedUsers = mutedUsers.filter(user => user.username !== username);
                    localStorage.setItem('mutedUsers', JSON.stringify(updatedMutedUsers));
                    return false;
                }
            }
            return false;
        }
        
        // 获取用户禁言状态
        function getUserMuteStatus(username) {
            const mutedUsers = JSON.parse(localStorage.getItem('mutedUsers'));
            const mutedUser = mutedUsers.find(user => user.username === username);
            
            if (mutedUser) {
                if (mutedUser.expiryTime === -1) {
                    return `永久禁言\n原因: ${mutedUser.reason || '未指定'}`;
                } else if (Date.now() < mutedUser.expiryTime) {
                    const expiryDate = new Date(mutedUser.expiryTime);
                    return `禁言至: ${expiryDate.toLocaleString()}\n原因: ${mutedUser.reason || '未指定'}`;
                } else {
                    // 禁言已过期，自动解除
                    const updatedMutedUsers = mutedUsers.filter(user => user.username !== username);
                    localStorage.setItem('mutedUsers', JSON.stringify(updatedMutedUsers));
                    return '';
                }
            }
            return '';
        }
        
        // 显示登录模态框
        function showLoginModal() {
            const loginModal = document.getElementById('loginModal');
            loginModal.style.display = 'flex';
            setTimeout(() => {
                loginModal.style.opacity = '1';
                loginModal.style.visibility = 'visible';
            }, 10);
        }
        
        // 关闭登录模态框
        function closeLoginModal() {
            const loginModal = document.getElementById('loginModal');
            loginModal.style.opacity = '0';
            loginModal.style.visibility = 'hidden';
            setTimeout(() => {
                loginModal.style.display = 'none';
            }, 300);
        }
        
        // 切换登录标签
        function switchLoginTab(tab) {
            // 移除所有标签的active类
            document.querySelectorAll('.login-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // 移除所有面板的active类
            document.querySelectorAll('.login-panel').forEach(panel => {
                panel.classList.remove('active');
            });
            
            // 添加当前标签和面板的active类
            document.querySelector(`.login-tab[onclick="switchLoginTab('${tab}')"]`).classList.add('active');
            if (tab === 'register') {
                document.getElementById('registerPanel').classList.add('active');
            } else {
                document.getElementById(`${tab}LoginPanel`).classList.add('active');
            }
        }
        
        // 登录功能
        function login(type) {
            if (type === 'user') {
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();
                
                if (username && password) {
                    // 检查是否被封禁
                    const bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
                    if (bannedUsers.includes(username)) {
                        alert('您的账户已被封禁，无法登录');
                        return;
                    }
                    
                    // 验证用户凭证
                    const users = JSON.parse(localStorage.getItem('users'));
                    const user = users.find(user => user.username === username && user.password === password);
                    
                    if (user) {
                        localStorage.setItem('userLoggedIn', 'true');
                        localStorage.setItem('username', username);
                        updateUserStatus();
                        closeLoginModal();
                    } else {
                        alert('用户名或密码错误');
                    }
                } else {
                    alert('请输入用户名和密码');
                }
            } else if (type === 'admin') {
                const username = document.getElementById('adminUsername').value.trim();
                const password = document.getElementById('adminPassword').value.trim();
                
                // 管理员登录验证
                if (username === 'tbnb' && password === 'tbnb123') {
                    localStorage.setItem('adminLoggedIn', 'true');
                    updateUserStatus();
                    closeLoginModal();
                } else {
                    alert('管理员用户名或密码错误');
                }
            }
        }
        
        // 注册功能
        function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const confirmPassword = document.getElementById('registerConfirmPassword').value.trim();
            
            if (!username || !password || !confirmPassword) {
                alert('请填写所有字段');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            // 检查是否被封禁
            const bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
            if (bannedUsers.includes(username)) {
                alert('该用户名已被封禁，无法注册');
                return;
            }
            
            // 获取设备指纹
            const deviceFingerprint = getDeviceFingerprint();
            
            // 检查该设备是否已经注册过
            const registeredDevices = JSON.parse(localStorage.getItem('registeredDevices'));
            if (registeredDevices.includes(deviceFingerprint)) {
                alert('该设备已经注册过账户，每个设备只能注册一次');
                return;
            }
            
            // 检查用户名是否已存在
            const users = JSON.parse(localStorage.getItem('users'));
            const existingUser = users.find(user => user.username === username);
            if (existingUser) {
                alert('该用户名已存在，请选择其他用户名');
                return;
            }
            
            // 注册新用户
            const newUser = {
                username: username,
                password: password, // 实际应用中应该加密存储
                deviceFingerprint: deviceFingerprint,
                registeredAt: new Date().toISOString()
            };
            
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // 记录设备已注册
            registeredDevices.push(deviceFingerprint);
            localStorage.setItem('registeredDevices', JSON.stringify(registeredDevices));
            
            alert('注册成功！请使用新账户登录');
            
            // 切换到登录标签
            switchLoginTab('user');
            
            // 填充用户名到登录表单
            document.getElementById('username').value = username;
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('userLoggedIn');
            localStorage.removeItem('adminLoggedIn');
            localStorage.removeItem('username');
            updateUserStatus();
        }
        
        // 更新用户状态
        function updateUserStatus() {
            const userStatus = document.getElementById('userStatus');
            const loginBtn = document.getElementById('loginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const postForm = document.getElementById('postForm');
            const adminControls = document.getElementById('adminControls');
            
            const isUserLoggedIn = localStorage.getItem('userLoggedIn') === 'true';
            const isAdminLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
            
            if (isAdminLoggedIn) {
                userStatus.textContent = '管理员已登录';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                postForm.style.display = 'block';
                adminControls.style.display = 'block';
                renderBannedUsers();
                renderMembers();
            } else if (isUserLoggedIn) {
                const username = localStorage.getItem('username');
                userStatus.textContent = `用户 ${username} 已登录`;
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
                postForm.style.display = 'block';
                adminControls.style.display = 'none';
            } else {
                userStatus.textContent = '未登录';
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
                postForm.style.display = 'none';
                adminControls.style.display = 'none';
            }
        }
        
        // 发布帖子
        function createPost() {
            const title = document.getElementById('postTitle').value.trim();
            const content = document.getElementById('postContent').value.trim();
            const author = localStorage.getItem('adminLoggedIn') === 'true' ? '管理员' : localStorage.getItem('username');
            
            // 检查用户是否被禁言
            if (!localStorage.getItem('adminLoggedIn') && isUserMuted(author)) {
                alert('您已被禁言，无法发布帖子');
                return;
            }
            
            if (title && content) {
                const posts = JSON.parse(localStorage.getItem('posts'));
                posts.unshift({
                    id: Date.now().toString(),
                    title: title,
                    content: content,
                    author: author,
                    createdAt: new Date().toISOString(),
                    comments: []
                });
                localStorage.setItem('posts', JSON.stringify(posts));
                renderPosts();
                document.getElementById('postTitle').value = '';
                document.getElementById('postContent').value = '';
            } else {
                alert('请填写标题和内容');
            }
        }
        
        // 渲染帖子列表
        function renderPosts() {
            const postsContainer = document.getElementById('postsList');
            const posts = JSON.parse(localStorage.getItem('posts'));
            
            if (posts.length === 0) {
                postsContainer.innerHTML = '<p style="color: #ccc;">暂无帖子</p>';
                return;
            }
            
            postsContainer.innerHTML = '';
            
            posts.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'post';
                
                // 检查当前用户是否是帖子作者或管理员
                const currentUser = localStorage.getItem('username');
                const isAdmin = localStorage.getItem('adminLoggedIn') === 'true';
                const isAuthor = currentUser === post.author;
                
                let postActions = '';
                if (isAdmin || isAuthor) {
                    postActions = `
                        <div class="post-actions">
                            <button class="btn" onclick="editPost('${post.id}')">编辑</button>
                            <button class="btn" onclick="deletePost('${post.id}')">删除</button>
                        </div>
                    `;
                }
                
                let commentsHtml = '';
                if (post.comments && post.comments.length > 0) {
                    post.comments.forEach(comment => {
                        // 检查当前用户是否是评论作者或管理员
                        const isCommentAuthor = currentUser === comment.author;
                        let commentActions = '';
                        if (isAdmin || isCommentAuthor) {
                            commentActions = `
                                <div class="comment-actions">
                                    <button onclick="deleteComment('${post.id}', '${comment.id}')">删除</button>
                                </div>
                            `;
                        }
                        commentsHtml += `
                            <div class="comment">
                                <div class="comment-meta">
                                    <strong>${comment.author}</strong> - ${new Date(comment.createdAt).toLocaleString()}
                                </div>
                                <div class="comment-content">${comment.content}</div>
                                ${commentActions}
                            </div>
                        `;
                    });
                }
                
                let commentForm = '';
                if (localStorage.getItem('userLoggedIn') === 'true' || localStorage.getItem('adminLoggedIn') === 'true') {
                    commentForm = `
                        <div class="comment-form">
                            <div class="form-group">
                                <textarea id="comment-${post.id}" placeholder="写下你的评论..."></textarea>
                            </div>
                            <button class="btn" onclick="addComment('${post.id}')">发布评论</button>
                        </div>
                    `;
                }
                
                postElement.innerHTML = `
                    <div class="post-header">
                        <h3 class="post-title">${post.title}</h3>
                        <div class="post-meta">
                            ${post.author} - ${new Date(post.createdAt).toLocaleString()}
                        </div>
                    </div>
                    <div class="post-content">${post.content}</div>
                    ${postActions}
                    <div class="comments">
                        ${commentsHtml}
                        ${commentForm}
                    </div>
                `;
                
                postsContainer.appendChild(postElement);
            });
        }
        
        // 发布评论
        function addComment(postId) {
            const commentContent = document.getElementById(`comment-${postId}`).value.trim();
            const author = localStorage.getItem('adminLoggedIn') === 'true' ? '管理员' : localStorage.getItem('username');
            
            // 检查用户是否被禁言
            if (!localStorage.getItem('adminLoggedIn') && isUserMuted(author)) {
                alert('您已被禁言，无法发布评论');
                return;
            }
            
            if (commentContent) {
                const posts = JSON.parse(localStorage.getItem('posts'));
                const post = posts.find(p => p.id === postId);
                if (post) {
                    post.comments.push({
                        id: Date.now().toString(),
                        content: commentContent,
                        author: author,
                        createdAt: new Date().toISOString()
                    });
                    localStorage.setItem('posts', JSON.stringify(posts));
                    renderPosts();
                }
            } else {
                alert('请填写评论内容');
            }
        }
        
        // 编辑帖子
        function editPost(postId) {
            const posts = JSON.parse(localStorage.getItem('posts'));
            const post = posts.find(p => p.id === postId);
            if (post) {
                const newTitle = prompt('请输入新的标题', post.title);
                const newContent = prompt('请输入新的内容', post.content);
                if (newTitle && newContent) {
                    post.title = newTitle;
                    post.content = newContent;
                    localStorage.setItem('posts', JSON.stringify(posts));
                    renderPosts();
                }
            }
        }
        
        // 删除帖子
        function deletePost(postId) {
            if (confirm('确定要删除这篇帖子吗？')) {
                const posts = JSON.parse(localStorage.getItem('posts'));
                const updatedPosts = posts.filter(p => p.id !== postId);
                localStorage.setItem('posts', JSON.stringify(updatedPosts));
                renderPosts();
            }
        }
        
        // 删除评论
        function deleteComment(postId, commentId) {
            if (confirm('确定要删除这条评论吗？')) {
                const posts = JSON.parse(localStorage.getItem('posts'));
                const post = posts.find(p => p.id === postId);
                if (post) {
                    post.comments = post.comments.filter(c => c.id !== commentId);
                    localStorage.setItem('posts', JSON.stringify(posts));
                    renderPosts();
                }
            }
        }
        
        // 渲染封禁用户列表
        function renderBannedUsers() {
            const bannedUsersContainer = document.getElementById('bannedUsers');
            const bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
            
            if (bannedUsers.length === 0) {
                bannedUsersContainer.innerHTML = '<p style="color: #ccc;">暂无被封禁的用户</p>';
                return;
            }
            
            bannedUsersContainer.innerHTML = '';
            
            bannedUsers.forEach(username => {
                const userElement = document.createElement('div');
                userElement.className = 'banned-user';
                userElement.innerHTML = `
                    <span>${username}</span>
                    <button class="unban-btn" onclick="unbanUser('${username}')">解封</button>
                `;
                bannedUsersContainer.appendChild(userElement);
            });
        }
        
        // 渲染已注册成员列表
        function renderMembers() {
            const membersContainer = document.getElementById('members');
            const users = JSON.parse(localStorage.getItem('users'));
            
            if (users.length === 0) {
                membersContainer.innerHTML = '<p style="color: #ccc;">暂无注册成员</p>';
                return;
            }
            
            membersContainer.innerHTML = '';
            
            users.forEach(user => {
                const muteStatus = getUserMuteStatus(user.username);
                const userElement = document.createElement('div');
                userElement.className = 'member-item';
                
                let actionButtons = '';
                if (muteStatus) {
                    actionButtons = `
                        <div class="member-actions">
                            <button class="unban-member-btn" onclick="unbanMutedUser('${user.username}')">解除禁言</button>
                            <button class="delete-member-btn" onclick="deleteMember('${user.username}')">删除</button>
                        </div>
                    `;
                } else {
                    actionButtons = `
                        <div class="member-actions">
                            <button class="ban-member-btn" onclick="showBanModal('${user.username}')">禁言</button>
                            <button class="delete-member-btn" onclick="deleteMember('${user.username}')">删除</button>
                        </div>
                    `;
                }
                
                userElement.innerHTML = `
                    <div class="member-info">
                        <span class="member-username">${user.username}</span>
                        <span class="member-registered">注册时间: ${new Date(user.registeredAt).toLocaleString()}</span>
                        ${muteStatus ? `<span class="member-status">${muteStatus.replace(/\\n/g, '<br>')}</span>` : ''}
                    </div>
                    ${actionButtons}
                `;
                membersContainer.appendChild(userElement);
            });
        }
        
        // 封禁用户
        function banUser(username) {
            let bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
            if (!bannedUsers.includes(username)) {
                bannedUsers.push(username);
                localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers));
                renderBannedUsers();
                alert(`用户 ${username} 已被封禁`);
            }
        }
        
        // 解封用户
        function unbanUser(username) {
            let bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
            bannedUsers = bannedUsers.filter(user => user !== username);
            localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers));
            renderBannedUsers();
            alert(`用户 ${username} 已被解封`);
        }
        
        // 删除成员账户
        function deleteMember(username) {
            if (confirm(`确定要删除成员 ${username} 的账户吗？此操作不可恢复。`)) {
                // 从用户列表中删除
                let users = JSON.parse(localStorage.getItem('users'));
                const userToDelete = users.find(user => user.username === username);
                
                if (userToDelete) {
                    // 从用户列表中移除
                    users = users.filter(user => user.username !== username);
                    localStorage.setItem('users', JSON.stringify(users));
                    
                    // 从已注册设备列表中移除
                    let registeredDevices = JSON.parse(localStorage.getItem('registeredDevices'));
                    registeredDevices = registeredDevices.filter(fingerprint => fingerprint !== userToDelete.deviceFingerprint);
                    localStorage.setItem('registeredDevices', JSON.stringify(registeredDevices));
                    
                    // 从封禁列表中移除（如果存在）
                    let bannedUsers = JSON.parse(localStorage.getItem('bannedUsers'));
                    bannedUsers = bannedUsers.filter(user => user !== username);
                    localStorage.setItem('bannedUsers', JSON.stringify(bannedUsers));
                    
                    // 从禁言列表中移除（如果存在）
                    let mutedUsers = JSON.parse(localStorage.getItem('mutedUsers'));
                    mutedUsers = mutedUsers.filter(user => user.username !== username);
                    localStorage.setItem('mutedUsers', JSON.stringify(mutedUsers));
                    
                    // 重新渲染成员列表和封禁用户列表
                    renderMembers();
                    renderBannedUsers();
                    
                    alert(`成员 ${username} 的账户已被删除`);
                }
            }
        }
        
        // 显示禁言模态框
        function showBanModal(username) {
            const banModal = document.getElementById('banModal');
            document.getElementById('banUsername').value = username;
            banModal.style.display = 'flex';
            setTimeout(() => {
                banModal.style.opacity = '1';
                banModal.style.visibility = 'visible';
            }, 10);
        }
        
        // 关闭禁言模态框
        function closeBanModal() {
            const banModal = document.getElementById('banModal');
            banModal.style.opacity = '0';
            banModal.style.visibility = 'hidden';
            setTimeout(() => {
                banModal.style.display = 'none';
            }, 300);
        }
        
        // 切换自定义禁言时间显示
        function toggleCustomBanTime() {
            const banDuration = document.getElementById('banDuration').value;
            const customBanTime = document.getElementById('customBanTime');
            
            if (banDuration === 'custom') {
                customBanTime.style.display = 'block';
            } else {
                customBanTime.style.display = 'none';
            }
        }
        
        // 切换自定义禁言理由显示
        function toggleCustomBanReason() {
            const banReason = document.getElementById('banReason').value;
            const customBanReason = document.getElementById('customBanReason');
            
            if (banReason === 'custom') {
                customBanReason.style.display = 'block';
            } else {
                customBanReason.style.display = 'none';
            }
        }
        
        // 切换自定义禁言理由显示
        function toggleCustomBanReason() {
            const banReason = document.getElementById('banReason').value;
            const customBanReason = document.getElementById('customBanReason');
            
            if (banReason === 'custom') {
                customBanReason.style.display = 'block';
            } else {
                customBanReason.style.display = 'none';
            }
        }
        
        // 禁言用户
        function banUser() {
            const username = document.getElementById('banUsername').value;
            let duration = parseInt(document.getElementById('banDuration').value);
            
            // 处理自定义禁言时间
            if (document.getElementById('banDuration').value === 'custom') {
                const customValue = parseInt(document.getElementById('customBanValue').value);
                const customUnit = document.getElementById('customBanUnit').value;
                
                if (!customValue || customValue < 1) {
                    alert('请输入有效的禁言时长');
                    return;
                }
                
                // 根据单位计算毫秒数
                switch (customUnit) {
                    case 'minutes':
                        duration = customValue * 60 * 1000;
                        break;
                    case 'hours':
                        duration = customValue * 60 * 60 * 1000;
                        break;
                    case 'days':
                        duration = customValue * 24 * 60 * 60 * 1000;
                        break;
                }
            }
            
            // 处理禁言理由
            let banReason = document.getElementById('banReason').value;
            if (banReason === 'custom') {
                const customReason = document.getElementById('customBanReasonText').value.trim();
                if (!customReason) {
                    alert('请输入禁言理由');
                    return;
                }
                banReason = customReason;
            } else if (!banReason) {
                alert('请选择禁言理由');
                return;
            }
            
            const expiryTime = duration === -1 ? -1 : Date.now() + duration;
            
            let mutedUsers = JSON.parse(localStorage.getItem('mutedUsers'));
            
            // 检查用户是否已被禁言
            const existingMutedUser = mutedUsers.find(user => user.username === username);
            if (existingMutedUser) {
                // 更新禁言时间和理由
                existingMutedUser.expiryTime = expiryTime;
                existingMutedUser.reason = banReason;
                existingMutedUser.bannedAt = Date.now();
            } else {
                // 添加新的禁言记录
                mutedUsers.push({
                    username: username,
                    expiryTime: expiryTime,
                    reason: banReason,
                    bannedAt: Date.now()
                });
            }
            
            localStorage.setItem('mutedUsers', JSON.stringify(mutedUsers));
            closeBanModal();
            renderMembers();
            alert(`用户 ${username} 已被禁言`);
        }
        
        // 解除禁言
        function unbanMutedUser(username) {
            let mutedUsers = JSON.parse(localStorage.getItem('mutedUsers'));
            mutedUsers = mutedUsers.filter(user => user.username !== username);
            localStorage.setItem('mutedUsers', JSON.stringify(mutedUsers));
            renderMembers();
            alert(`用户 ${username} 的禁言已解除`);
        }
        
        // 回到顶部
        document.getElementById('backToTop').addEventListener('click', function() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
        
        // 滚动时显示/隐藏回到顶部按钮
        window.addEventListener('scroll', function() {
            const backToTop = document.getElementById('backToTop');
            if (window.scrollY > 300) {
                backToTop.style.display = 'flex';
            } else {
                backToTop.style.display = 'none';
            }
        });
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initData();
            updateUserStatus();
            renderPosts();
            
            // 关闭登录模态框
            document.getElementById('closeLoginModal').addEventListener('click', closeLoginModal);
            
            // 关闭禁言模态框
            document.getElementById('closeBanModal').addEventListener('click', closeBanModal);
            
            // 点击模态框外部关闭
            window.addEventListener('click', function(event) {
                const loginModal = document.getElementById('loginModal');
                const banModal = document.getElementById('banModal');
                
                if (event.target === loginModal) {
                    closeLoginModal();
                }
                
                if (event.target === banModal) {
                    closeBanModal();
                }
            });
            
            // 每隔5秒自动刷新页面
            setInterval(function() {
                location.reload();
            }, 5000); // 5秒 = 5000毫秒
        });
    </script>
